<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">GitHub metrics placeholder</title>
  <desc id="desc">Placeholder card shown until the metrics workflow generates the real SVG.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)" />
  <rect x="28" y="28" width="1144" height="304" rx="22" fill="#0b1220" fill-opacity="0.76" stroke="#60a5fa" stroke-opacity="0.35" />
  <text x="70" y="112" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">
    GitHub Metrics Will Appear Here
  </text>
  <text x="70" y="164" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="24">
    Run the "Generate Metrics" workflow after adding the METRICS_TOKEN secret.
  </text>
  <text x="70" y="214" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    Settings → Secrets and variables → Actions → New repository secret
  </text>
  <text x="70" y="248" fill="#86efac" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    Secret name: METRICS_TOKEN
  </text>
  <text x="70" y="282" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    After the first run, this placeholder is replaced automatically by the workflow output.
  </text>
</svg>
